name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]  # 你的仓库默认分支是master，不是main
  workflow_dispatch:    # 新增：允许手动点击触发部署（测试用）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # 新增：缓存依赖，大幅加快后续部署速度
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Vue project
        run: npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # Vite 构建产物目录，正确
          publish_branch: gh-pages  # 明确指定发布分支，避免默认值问题
